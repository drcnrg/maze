<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Maze</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        neonPink: '#ff2a85',
                        neonCyan: '#00f0ff',
                        darkBg: '#08080c',
                        glass: 'rgba(20, 20, 30, 0.65)'
                    },
                    boxShadow: {
                        'neon-pink': '0 0 10px #ff2a85, 0 0 20px #ff2a85',
                        'neon-cyan': '0 0 10px #00f0ff, 0 0 20px #00f0ff',
                        'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.5)',
                    }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #08080c; color: #fff; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-panel { background: rgba(20, 20, 30, 0.65); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; }
        .grid-bg { background-image: linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px); background-size: 50px 50px; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 240, 255, 0.4); border-radius: 2px; }

        #mazeCanvas { border-radius: 8px; box-shadow: 0 0 20px rgba(0, 240, 255, 0.1); }
    </style>
</head>
<body class="h-screen w-screen flex flex-col items-center justify-center grid-bg relative">

    <div id="lobby-ui" class="glass-panel p-8 w-96 flex flex-col gap-6 shadow-glass z-20 transition-opacity duration-300">
        <h1 class="text-4xl font-black text-center text-transparent bg-clip-text bg-gradient-to-br from-neonCyan to-neonPink drop-shadow-[0_0_8px_rgba(0,240,255,0.6)] tracking-wider">NEON MAZE</h1>
        
        <div class="flex flex-col gap-4">
            <input type="text" id="playerName" placeholder="Enter Player Name" class="w-full bg-black/50 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-neonCyan transition-colors text-center text-lg font-semibold tracking-wide">
            <button id="btnCreate" class="w-full py-3 rounded-lg bg-neonCyan text-darkBg font-bold text-lg hover:shadow-neon-cyan transition-all transform hover:scale-[1.02]">Create New Room</button>
        </div>

        <div class="flex items-center gap-3 opacity-60">
            <hr class="flex-grow border-gray-600">
            <span class="text-xs uppercase tracking-widest font-bold">OR JOIN</span>
            <hr class="flex-grow border-gray-600">
        </div>

        <div class="flex gap-2">
            <input type="text" id="roomCodeInput" placeholder="ROOM CODE" maxlength="6" class="w-2/3 bg-black/50 border border-gray-700 rounded-lg px-4 py-3 focus:outline-none focus:border-neonPink text-center tracking-[0.3em] uppercase transition-colors font-mono font-bold text-lg">
            <button id="btnJoin" class="w-1/3 py-3 rounded-lg bg-neonPink text-white font-bold hover:shadow-neon-pink transition-all transform hover:scale-[1.02]">Join</button>
        </div>
        
        <p id="lobbyMsg" class="text-center text-sm text-neonPink h-4 font-semibold"></p>
    </div>

    <div id="game-ui" class="hidden h-full w-full flex flex-col items-center p-4 md:p-6 z-10 gap-4 max-w-7xl mx-auto">
        
        <div class="glass-panel w-full px-6 py-4 flex flex-wrap justify-between items-center shrink-0">
            <div class="flex items-center gap-6">
                <div class="flex flex-col">
                    <span class="text-[10px] text-gray-400 uppercase tracking-widest">Room Code</span>
                    <span id="displayRoomCode" class="font-mono text-neonPink font-bold tracking-widest text-2xl">------</span>
                </div>
                <div class="h-8 w-px bg-gray-700"></div>
                <div class="flex flex-col">
                    <span class="text-[10px] text-gray-400 uppercase tracking-widest">Level</span>
                    <span id="displayLevel" class="text-white font-black text-2xl drop-shadow-[0_0_5px_rgba(255,255,255,0.5)]">1</span>
                </div>
            </div>
            <div id="gameStatus" class="text-neonCyan font-bold tracking-wide animate-pulse bg-neonCyan/10 px-4 py-2 rounded-full border border-neonCyan/30">
                Waiting for players...
            </div>
        </div>

        <div class="flex flex-col md:flex-row gap-4 w-full flex-grow min-h-0">
            
            <div class="flex-grow flex items-center justify-center glass-panel relative overflow-hidden p-2 min-h-0">
                <canvas id="mazeCanvas"></canvas>
                
                <div id="transitionOverlay" class="hidden absolute inset-0 bg-darkBg/90 backdrop-blur-md flex flex-col items-center justify-center gap-4 z-20">
                    <h2 class="text-4xl font-black text-neonCyan drop-shadow-[0_0_10px_rgba(0,240,255,0.8)] tracking-wider">LEVEL CLEAR!</h2>
                    <p class="text-gray-300 text-lg tracking-wide">All players reached the objective.</p>
                    <p class="text-neonPink font-mono text-xl mt-4">Next level in <span id="countdown">3</span>...</p>
                </div>
            </div>

            <div class="glass-panel w-full md:w-72 p-5 flex flex-col flex-shrink-0 min-h-0">
                <h3 class="text-neonCyan text-sm uppercase tracking-[0.2em] font-bold mb-4 flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-neonCyan shadow-neon-cyan animate-pulse"></div>
                    Online Players
                </h3>
                <ul id="playerList" class="flex flex-col gap-3 overflow-y-auto pr-2">
                    </ul>
                
                <div class="mt-auto pt-4 border-t border-gray-700/50 text-xs text-gray-400">
                    <p>Controls: <span class="text-white font-mono bg-white/10 px-1 rounded">WASD</span> or <span class="text-white font-mono bg-white/10 px-1 rounded">Arrows</span></p>
                </div>
            </div>
        </div>
    </div>

    <div class="absolute bottom-3 text-[10px] text-gray-600 tracking-[0.3em] font-semibold z-0 pointer-events-none uppercase">
        Made with 💗by MAYBORG
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCqJ9pqMpjME0NgTe_PnKwigD-oKT1Lzh8",
            authDomain: "tictactoe-office.firebaseapp.com",
            databaseURL: "https://tictactoe-office-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "tictactoe-office",
            storageBucket: "tictactoe-office.firebasestorage.app",
            messagingSenderId: "147452376605",
            appId: "1:147452376605:web:2316b702e1298c513778f4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // State
        let currentRoom = null;
        let myPlayerId = 'p_' + Math.random().toString(36).substr(2, 9);
        let myColor = `hsl(${Math.floor(Math.random() * 360)}, 100%, 65%)`;
        let isHost = false;
        
        let mazeData = null; 
        let playersData = {};
        let currentLevel = 1;
        let isTransitioning = false;

        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        
        const uiLobby = document.getElementById('lobby-ui');
        const uiGame = document.getElementById('game-ui');
        const overlay = document.getElementById('transitionOverlay');

        // ==== LOBBY ====
        document.getElementById('btnCreate').addEventListener('click', async () => {
            const name = document.getElementById('playerName').value.trim() || 'Player';
            const roomCode = Math.floor(100000 + Math.random() * 900000).toString();
            
            currentRoom = roomCode;
            isHost = true;

            await set(ref(db, `rooms/${roomCode}`), {
                level: 1,
                maze: generateMaze(10, 10), // Starting size
                host: myPlayerId
            });

            joinRoom(roomCode, name);
        });

        document.getElementById('btnJoin').addEventListener('click', async () => {
            const name = document.getElementById('playerName').value.trim() || 'Player';
            const roomCode = document.getElementById('roomCodeInput').value.trim().toUpperCase();
            
            if(roomCode.length !== 6) { document.getElementById('lobbyMsg').innerText = "Invalid code."; return; }

            const snap = await get(ref(db, `rooms/${roomCode}`));
            if (!snap.exists()) { document.getElementById('lobbyMsg').innerText = "Room not found."; return; }

            const pCount = snap.val().players ? Object.keys(snap.val().players).length : 0;
            if(pCount >= 6) { document.getElementById('lobbyMsg').innerText = "Room full."; return; }

            currentRoom = roomCode;
            joinRoom(roomCode, name);
        });

        async function joinRoom(roomCode, name) {
            uiLobby.style.opacity = '0';
            setTimeout(() => {
                uiLobby.classList.add('hidden');
                uiGame.classList.remove('hidden');
            }, 300);

            document.getElementById('displayRoomCode').innerText = roomCode;
            const myRef = ref(db, `rooms/${roomCode}/players/${myPlayerId}`);
            
            await set(myRef, { name, color: myColor, x: 0, y: 0, finished: false });
            onDisconnect(myRef).remove();

            onValue(ref(db, `rooms/${roomCode}`), (snapshot) => {
                const data = snapshot.val();
                if(!data) { alert("Room closed."); window.location.reload(); return; }
                
                playersData = data.players || {};
                
                if (currentLevel !== data.level || (data.maze && (!mazeData || mazeData.seed !== data.maze.seed))) {
                    currentLevel = data.level;
                    document.getElementById('displayLevel').innerText = currentLevel;
                    mazeData = data.maze;
                    isTransitioning = false;
                    overlay.classList.add('hidden');
                    resizeCanvas();
                }

                updateUI();
                checkLevelProgression();
                draw();
            });
        }

        // ==== MAZE GENERATION ====
        function generateMaze(cols, rows) {
            let grid = Array(rows).fill().map(() => Array(cols).fill().map(() => ({ top: true, right: true, bottom: true, left: true, visited: false })));
            let stack = [{ r: 0, c: 0 }];
            grid[0][0].visited = true;

            while (stack.length > 0) {
                let curr = stack[stack.length - 1];
                let n = [];
                if (curr.r > 0 && !grid[curr.r - 1][curr.c].visited) n.push({ r: curr.r - 1, c: curr.c, dir: 'top' });
                if (curr.c < cols - 1 && !grid[curr.r][curr.c + 1].visited) n.push({ r: curr.r, c: curr.c + 1, dir: 'right' });
                if (curr.r < rows - 1 && !grid[curr.r + 1][curr.c].visited) n.push({ r: curr.r + 1, c: curr.c, dir: 'bottom' });
                if (curr.c > 0 && !grid[curr.r][curr.c - 1].visited) n.push({ r: curr.r, c: curr.c - 1, dir: 'left' });

                if (n.length > 0) {
                    let next = n[Math.floor(Math.random() * n.length)];
                    let dr = curr.r - next.r, dc = curr.c - next.c;
                    if (dr === 1) { grid[curr.r][curr.c].top = false; grid[next.r][next.c].bottom = false; }
                    else if (dr === -1) { grid[curr.r][curr.c].bottom = false; grid[next.r][next.c].top = false; }
                    if (dc === 1) { grid[curr.r][curr.c].left = false; grid[next.r][next.c].right = false; }
                    else if (dc === -1) { grid[curr.r][curr.c].right = false; grid[next.r][next.c].left = false; }
                    
                    grid[next.r][next.c].visited = true;
                    stack.push(next);
                } else { stack.pop(); }
            }
            // End point at bottom right
            return { grid, cols, rows, seed: Date.now(), endR: rows - 1, endC: cols - 1 };
        }

        // ==== RENDERING ====
        function resizeCanvas() {
            if(!mazeData) return;
            const container = canvas.parentElement;
            const maxW = container.clientWidth - 20;
            const maxH = container.clientHeight - 20;
            
            mazeData.cellSize = Math.min(Math.floor(maxW / mazeData.cols), Math.floor(maxH / mazeData.rows), 45);
            canvas.width = mazeData.cols * mazeData.cellSize;
            canvas.height = mazeData.rows * mazeData.cellSize;
            draw();
        }
        window.addEventListener('resize', resizeCanvas);

        function draw() {
            if(!mazeData) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cs = mazeData.cellSize;

            // Endpoint
            ctx.fillStyle = 'rgba(255, 42, 133, 0.3)';
            ctx.shadowBlur = 20; ctx.shadowColor = '#ff2a85';
            ctx.fillRect(mazeData.endC * cs, mazeData.endR * cs, cs, cs);
            ctx.shadowBlur = 0;

            // Walls
            ctx.strokeStyle = 'rgba(0, 240, 255, 0.4)';
            ctx.lineWidth = 2;
            ctx.lineCap = 'round';
            
            ctx.beginPath();
            for (let r = 0; r < mazeData.rows; r++) {
                for (let c = 0; c < mazeData.cols; c++) {
                    const cell = mazeData.grid[r][c], x = c * cs, y = r * cs;
                    if (cell.top) { ctx.moveTo(x, y); ctx.lineTo(x + cs, y); }
                    if (cell.right) { ctx.moveTo(x + cs, y); ctx.lineTo(x + cs, y + cs); }
                    if (cell.bottom) { ctx.moveTo(x, y + cs); ctx.lineTo(x + cs, y + cs); }
                    if (cell.left) { ctx.moveTo(x, y); ctx.lineTo(x, y + cs); }
                }
            }
            ctx.stroke();

            // Players
            Object.values(playersData).forEach(p => {
                ctx.fillStyle = p.color;
                ctx.shadowBlur = p.finished ? 25 : 12; ctx.shadowColor = p.color;
                ctx.beginPath();
                ctx.arc(p.x * cs + cs/2, p.y * cs + cs/2, cs/3.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });
        }

        // ==== MOVEMENT ====
        window.addEventListener('keydown', (e) => {
            if(!currentRoom || !mazeData || !playersData[myPlayerId] || isTransitioning) return;
            const me = playersData[myPlayerId];
            if(me.finished) return;

            let newR = me.y, newC = me.x;
            const cell = mazeData.grid[me.y][me.x];

            if (['ArrowUp', 'w', 'W'].includes(e.key) && !cell.top) newR--;
            else if (['ArrowRight', 'd', 'D'].includes(e.key) && !cell.right) newC++;
            else if (['ArrowDown', 's', 'S'].includes(e.key) && !cell.bottom) newR++;
            else if (['ArrowLeft', 'a', 'A'].includes(e.key) && !cell.left) newC--;

            if (newR !== me.y || newC !== me.x) {
                const finished = (newR === mazeData.endR && newC === mazeData.endC);
                update(ref(db, `rooms/${currentRoom}/players/${myPlayerId}`), { x: newC, y: newR, finished });
            }
        });

        // ==== LOGIC SYNC ====
        function updateUI() {
            const list = document.getElementById('playerList');
            list.innerHTML = '';
            let pCount = 0, finishedCount = 0;

            Object.entries(playersData).forEach(([id, p]) => {
                pCount++; if(p.finished) finishedCount++;
                list.innerHTML += `
                    <li class="flex items-center justify-between p-3 rounded-lg bg-black/40 border border-white/5 shadow-inner">
                        <div class="flex items-center gap-3">
                            <div class="w-3 h-3 rounded-full shadow-[0_0_10px_currentColor]" style="color: ${p.color}; background: ${p.color}"></div>
                            <span class="${id === myPlayerId ? 'font-bold text-white' : 'text-gray-300'} truncate w-28">${p.name}</span>
                        </div>
                        ${p.finished ? '<span class="text-[10px] font-bold text-neonPink uppercase tracking-wider bg-neonPink/10 px-2 py-1 rounded">Done</span>' : ''}
                    </li>`;
            });

            const status = document.getElementById('gameStatus');
            if (pCount === 0) status.innerText = "Waiting...";
            else if (finishedCount === pCount) {
                status.innerText = "Level Cleared!";
                status.className = "text-neonPink font-bold tracking-wide animate-pulse bg-neonPink/10 px-4 py-2 rounded-full border border-neonPink/30";
            } else {
                status.innerText = `Running (${finishedCount}/${pCount} Done)`;
                status.className = "text-neonCyan font-bold tracking-wide bg-neonCyan/10 px-4 py-2 rounded-full border border-neonCyan/30";
            }
        }

        function checkLevelProgression() {
            const keys = Object.keys(playersData);
            if(keys.length === 0 || isTransitioning) return;

            const allFinished = keys.every(k => playersData[k].finished);
            
            if (allFinished) {
                isTransitioning = true;
                overlay.classList.remove('hidden');
                
                let count = 3;
                const cdEl = document.getElementById('countdown');
                cdEl.innerText = count;
                
                const timer = setInterval(() => {
                    count--;
                    cdEl.innerText = count;
                    if(count <= 0) {
                        clearInterval(timer);
                        if(isHost) generateNextLevel();
                    }
                }, 1000);
            }
        }

        async function generateNextLevel() {
            const nextLvl = currentLevel + 1;
            const size = Math.min(10 + (nextLvl * 2), 30); // Max size 30x30
            
            const updates = { level: nextLvl, maze: generateMaze(size, size) };
            Object.keys(playersData).forEach(pId => {
                updates[`players/${pId}/x`] = 0;
                updates[`players/${pId}/y`] = 0;
                updates[`players/${pId}/finished`] = false;
            });

            await update(ref(db, `rooms/${currentRoom}`), updates);
        }
    </script>
</body>
</html>
